services:
  zeroclaw:
    image: ghcr.io/xumarcus/zeroclaw:whatsapp-web
    container_name: zeroclaw
    restart: unless-stopped
    environment:
      - API_KEY=${API_KEY:-}
      - PROVIDER={PROVIDER:-openrouter}
      - ZEROCLAW_ALLOW_PUBLIC_BIND=true
      - ZEROCLAW_GATEWAY_HOST=127.0.0.1
      - ZEROCLAW_GATEWAY_PORT=${ZEROCLAW_GATEWAY_PORT:-42617}
    volumes:
      - zeroclaw-data:/zeroclaw-data
    ports:
      - "${HOST_PORT:-42617}:${ZEROCLAW_GATEWAY_PORT:-42617}"
    healthcheck:
      test: ["CMD", "zeroclaw", "status"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  zeroclaw-data:
